<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pretzil Joy Vivares</title>
       
    <style>
        body {
            margin: 0;
            font-family: 'Brush Script MT', cursive;
        }

        #content {
            padding: 2rem;
        }

        nav a.active {
            background: #666;
            color: whitesmoke;
        }

        /* ====================================
           TOPIC DROPDOWN STYLES (Kept intact)
        ==================================== */
        .topics {
            max-width: 700px;
            margin: auto;
        }

        .topic {
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }

        .topic h3 {
            margin: 0;
            padding: 1rem;
            background: #f5f5f5;
            cursor: pointer;
            transition: 0.3s;
        }

        .topic-content {
            max-height: 0;
            overflow: hidden;
            background: white;
            padding: 0 1rem;
            transition: max-height 0.4s ease, padding 0.4s ease;
        }

        .topic:hover .topic-content {
            max-height: 400px;
            padding: 1rem;
        }

        .topic:hover h3 {
            background: #ddd;
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <main id="content">

        </main>

    <div id="footer"></div>

    <script>
        // Load layout component HTML files
        async function loadHTML(id, file) {
            const res = await fetch(file);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;
        }

        // Load page content dynamically 
        async function loadPage(page) {
            const res = await fetch('pages/' + page);
            const htmlText = await res.text();
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            
            const bodyContent = doc.body ? doc.body.innerHTML : htmlText;
            document.getElementById('content').innerHTML = bodyContent;

            const styleSheets = doc.querySelectorAll('link[rel="stylesheet"]');
            styleSheets.forEach(sheet => {
                const href = sheet.getAttribute('href');
                if (!document.querySelector(`link[href="${href}"]`)) {
                    const linkClone = document.createElement('link');
                    linkClone.rel = 'stylesheet';
                    linkClone.href = href;
                    document.head.appendChild(linkClone);
                }
            });

            const scripts = doc.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                
                setTimeout(() => {
                    document.body.appendChild(newScript);
                    newScript.remove(); 
                }, 50);
            });

            // Highlight active nav link
            document.querySelectorAll('nav a').forEach(link => {
                link.classList.toggle(
                    'active',
                    link.getAttribute('data-page') === page
                );
            });
        }

        // Bind navigation clicks
        function bindNavLinks() {
            const headerEl = document.getElementById('header');
            headerEl.addEventListener('click', async (e) => {
                const link = e.target.closest('nav a');
                if (link) {
                    e.preventDefault();
                    const page = link.getAttribute('data-page');
                    if (page) {
                        await loadPage(page);
                    }
                }
            });
        }

        // Initialize page layout elements
        async function init() {
            // 1. First, wait for the header framework to load completely
            await loadHTML('header', 'header.html');
            await loadHTML('footer', 'footer.html');

            // 2. FIXED: Load your global contact info directly into the header slot
            // Now that header.html is fully in the DOM, 'contact-info' will be found perfectly!
            await loadHTML('contact-info', 'mycontact.html');

            // 3. Set up nav link event handlers
            bindNavLinks();

            // 4. Default initial viewport load
            await loadPage('aboutme.html');
            /*await loadPage('activities.html');
            await loadPage('adts.html');
            await loadPage('cete-quiz.html');
            await loadPage('experience.html');
            await loadPage('famie.html');
            await loadPage('tictactoe.html');
            await loadPage('skills.html');
            await loadPage('projects.html');
            await loadPage('trainings.html');        */   
        }

        init();
    </script>

</body>
</html>
