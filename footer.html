<footer style="background-color: #f37373; color: #fff; font-size: 0.8rem; padding: 0.5rem 0;">

    <div id="contact-info" style="text-align: center; padding: 0.4rem;">
        <!-- Contact info loads here -->
    </div>

    <p style="text-align: center; margin: 0; padding-bottom: 0.2rem; font-size: 0.75rem; opacity: 0.8;">
        Last Updated: May 16, 2026
    </p>

</footer>

<script>
    // Fetches your file relative to the root project folder
    fetch('mycontact.html')
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.text();
        })
        .then(data => {
            document.getElementById('contact-info').innerHTML = data;
        })
        .catch(error => {
            console.error('Error loading contact info:', error);
        });
</script>
